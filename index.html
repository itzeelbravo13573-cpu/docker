<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITZY Butterfly Dream</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(
        135deg,
        #f7d8ff,
        #e9c5ff,
        #dcb2ff
    );
    position:relative;
    font-family:Arial,sans-serif;
}

/* Fondo */
.background-text{
    position:absolute;
    inset:0;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:50px;
    color:rgba(128,0,128,0.08);
    font-size:70px;
    font-weight:bold;
    user-select:none;
    z-index:0;
}

.background-text span{
    transform:rotate(-20deg);
}

/* MARIPOSA */
.butterfly{
    position:absolute;
    width:120px;
    height:120px;
    z-index:10;
}

/* Alas superiores */
.wing-top{
    position:absolute;
    width:55px;
    height:70px;
    border-radius:70% 30% 70% 30%;
    background:linear-gradient(
        135deg,
        #ffb3ff,
        #d966ff,
        #8a2be2
    );
    box-shadow:
        0 0 20px rgba(255,150,255,.8),
        inset 0 0 12px rgba(255,255,255,.6);
}

/* Alas inferiores */
.wing-bottom{
    position:absolute;
    width:45px;
    height:55px;
    border-radius:30% 70% 30% 70%;
    background:linear-gradient(
        135deg,
        #ffd6ff,
        #f0a3ff,
        #b84dff
    );
    box-shadow:
        0 0 20px rgba(255,150,255,.6),
        inset 0 0 10px rgba(255,255,255,.5);
}

/* Izquierda */
.left-top{
    left:5px;
    top:5px;
    transform-origin:right center;
    animation:flapLeft .22s infinite alternate;
}

.left-bottom{
    left:15px;
    top:60px;
    transform-origin:right top;
    animation:flapLeft .22s infinite alternate;
}

/* Derecha */
.right-top{
    right:5px;
    top:5px;
    transform:scaleX(-1);
    transform-origin:left center;
    animation:flapRight .22s infinite alternate;
}

.right-bottom{
    right:15px;
    top:60px;
    transform:scaleX(-1);
    transform-origin:left top;
    animation:flapRight .22s infinite alternate;
}

/* Cuerpo */
.body-wing{
    position:absolute;
    left:50%;
    top:15px;
    transform:translateX(-50%);
    width:10px;
    height:85px;
    background:#4b0082;
    border-radius:20px;
}

/* Cabeza */
.head{
    position:absolute;
    width:18px;
    height:18px;
    background:#4b0082;
    border-radius:50%;
    left:50%;
    top:0;
    transform:translateX(-50%);
}

/* Antenas */
.antenna{
    position:absolute;
    width:2px;
    height:20px;
    background:#4b0082;
    top:-12px;
}

.ant-left{
    left:48%;
    transform:rotate(-30deg);
}

.ant-right{
    left:52%;
    transform:rotate(30deg);
}

/* Brillos */
.sparkle{
    position:absolute;
    width:7px;
    height:7px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 15px white;
    animation:sparkle 1.5s infinite alternate;
}

.s1{top:20px;left:10px;}
.s2{top:40px;right:10px;}
.s3{bottom:15px;left:20px;}

@keyframes sparkle{
    from{
        opacity:.3;
        transform:scale(.7);
    }
    to{
        opacity:1;
        transform:scale(1.4);
    }
}

/* Alas */
@keyframes flapLeft{
    from{transform:rotate(-20deg);}
    to{transform:rotate(25deg);}
}

@keyframes flapRight{
    from{transform:scaleX(-1) rotate(-20deg);}
    to{transform:scaleX(-1) rotate(25deg);}
}

/* Rutas de vuelo */

.b1{
    animation:fly1 14s linear infinite;
}

.b2{
    animation:fly2 16s linear infinite;
}

.b3{
    animation:fly3 18s linear infinite;
}

.b4{
    animation:fly4 15s linear infinite;
}

.b5{
    animation:fly5 20s linear infinite;
}

/* Trayectorias distintas */

@keyframes fly1{
    0%{left:-150px; top:70%;}
    25%{left:20%; top:20%;}
    50%{left:50%; top:40%;}
    75%{left:80%; top:10%;}
    100%{left:110%; top:50%;}
}

@keyframes fly2{
    0%{left:110%; top:80%;}
    25%{left:75%; top:40%;}
    50%{left:50%; top:70%;}
    75%{left:25%; top:25%;}
    100%{left:-150px; top:60%;}
}

@keyframes fly3{
    0%{left:-150px; top:20%;}
    25%{left:25%; top:60%;}
    50%{left:55%; top:15%;}
    75%{left:80%; top:50%;}
    100%{left:110%; top:25%;}
}

@keyframes fly4{
    0%{left:110%; top:10%;}
    25%{left:75%; top:55%;}
    50%{left:40%; top:30%;}
    75%{left:15%; top:70%;}
    100%{left:-150px; top:15%;}
}

@keyframes fly5{
    0%{left:50%; top:110%;}
    25%{left:15%; top:70%;}
    50%{left:75%; top:40%;}
    75%{left:35%; top:15%;}
    100%{left:50%; top:-150px;}
}
</style>
</head>
<body>

<div class="background-text">
    <span>ITZY</span><span>ITZY</span><span>ITZY</span>
    <span>ITZY</span><span>ITZY</span><span>ITZY</span>
    <span>ITZY</span><span>ITZY</span><span>ITZY</span>
    <span>ITZY</span><span>ITZY</span><span>ITZY</span>
</div>

<!-- Mariposas -->

<div class="butterfly b1">
    <div class="wing-top left-top"></div>
    <div class="wing-bottom left-bottom"></div>
    <div class="wing-top right-top"></div>
    <div class="wing-bottom right-bottom"></div>
    <div class="head"></div>
    <div class="antenna ant-left"></div>
    <div class="antenna ant-right"></div>
    <div class="body-wing"></div>
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
</div>

<div class="butterfly b2">
    <div class="wing-top left-top"></div>
    <div class="wing-bottom left-bottom"></div>
    <div class="wing-top right-top"></div>
    <div class="wing-bottom right-bottom"></div>
    <div class="head"></div>
    <div class="antenna ant-left"></div>
    <div class="antenna ant-right"></div>
    <div class="body-wing"></div>
</div>

<div class="butterfly b3">
    <div class="wing-top left-top"></div>
    <div class="wing-bottom left-bottom"></div>
    <div class="wing-top right-top"></div>
    <div class="wing-bottom right-bottom"></div>
    <div class="head"></div>
    <div class="antenna ant-left"></div>
    <div class="antenna ant-right"></div>
    <div class="body-wing"></div>
</div>

<div class="butterfly b4">
    <div class="wing-top left-top"></div>
    <div class="wing-bottom left-bottom"></div>
    <div class="wing-top right-top"></div>
    <div class="wing-bottom right-bottom"></div>
    <div class="head"></div>
    <div class="antenna ant-left"></div>
    <div class="antenna ant-right"></div>
    <div class="body-wing"></div>
</div>

<div class="butterfly b5">
    <div class="wing-top left-top"></div>
    <div class="wing-bottom left-bottom"></div>
    <div class="wing-top right-top"></div>
    <div class="wing-bottom right-bottom"></div>
    <div class="head"></div>
    <div class="antenna ant-left"></div>
    <div class="antenna ant-right"></div>
    <div class="body-wing"></div>
</div>

</body>
</html>
